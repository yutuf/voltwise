services:
  - type: web
    name: voltwise
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite:////data/voltwise.db
    disk:
      name: voltwise-data
      mountPath: /data
      sizeGB: 1
